name: docker-image-ci

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Login au GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build & Push l'image Docker
      uses: docker/build-push-action@v5
      with:
        context: ./filtre_logiciel        # dossier contenant le Dockerfile et main.py
        file: ./filtre_logiciel/Dockerfile
        push: ${{ github.event_name == 'push' }}   # push uniquement sur push (pas sur PR)
        tags: ghcr.io/${{ github.repository }}/obd-noil-transform:latest
